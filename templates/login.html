<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Attendix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-light auth-body">
    <div class="auth-container fade-in">
        <div class="auth-card saas-card">
            <div class="auth-header">
                <h2 class="gradient-text">Attendix Portal</h2>
                <p>Sign in to your professor dashboard</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">University Email</label>
                    <input type="email" id="email" placeholder="doctor@sha.edu.eg" required>
                    <span id="emailError" class="error-text">Only university emails (@sha.edu.eg) are allowed.</span>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>
            <div class="auth-footer">
                <a href="/">← Back to Home</a>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
