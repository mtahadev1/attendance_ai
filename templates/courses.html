<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses | Attendix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/main.css">
</head>
<body>
    <div class="app-layout">
        
        <aside class="sidebar">
            <div class="sidebar-brand"><a href="/"><img src="/static/logo.png" alt=""></a></div>
            
            <div class="prof-info">
                <div class="prof-name">Dr. Ahmed</div>
                <div class="prof-role">Professor</div>
            </div>
            
            <nav class="sidebar-nav">
        
                <a href="/courses" class="active">Courses</a>
                <a href="/" class="logout-link">Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h1>My Courses</h1>
                <p>Select a course to manage attendance.</p>
            </header>

            <div class="courses-grid">
                
                <div class="course-card">
                    <div class="course-info">
                        <h3 class="course-title">Data Structures</h3>
                        <span class="course-subtitle">CS101</span>
                    </div>
                    <div class="card-actions">
                        <button onclick="startFaceAttendance('Data Structures', 'CS101')" class="btn btn-primary">Face Attendance</button>
                        <button class="btn btn-outline">QR Attendance</button>
                    </div>
                </div>

                <div class="course-card">
                    <div class="course-info">
                        <h3 class="course-title">Operating Systems</h3>
                        <span class="course-subtitle">CS201</span>
                    </div>
                    <div class="card-actions">
                        <button onclick="startFaceAttendance('Operating Systems', 'CS201')" class="btn btn-primary">Face Attendance</button>
                        <button class="btn btn-outline">QR Attendance</button>
                    </div>
                </div>

                <div class="course-card">
                    <div class="course-info">
                        <h3 class="course-title">Artificial Intelligence</h3>
                        <span class="course-subtitle">CS301</span>
                    </div>
                    <div class="card-actions">
                        <button onclick="startFaceAttendance('Artificial Intelligence', 'CS301')" class="btn btn-primary">Face Attendance</button>
                        <button class="btn btn-outline">QR Attendance</button>
                    </div>
                </div>

                <div class="course-card">
                    <div class="course-info">
                        <h3 class="course-title">Database Systems</h3>
                        <span class="course-subtitle">CS202</span>
                    </div>
                    <div class="card-actions">
                        <button onclick="startFaceAttendance('Database Systems', 'CS202')" class="btn btn-primary">Face Attendance</button>
                        <button class="btn btn-outline">QR Attendance</button>
                    </div>
                </div>

                <div class="course-card">
                    <div class="course-info">
                        <h3 class="course-title">Computer Networks</h3>
                        <span class="course-subtitle">CS302</span>
                    </div>
                    <div class="card-actions">
                        <button onclick="startFaceAttendance('Computer Networks', 'CS302')" class="btn btn-primary">Face Attendance</button>
                        <button class="btn btn-outline">QR Attendance</button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        function startFaceAttendance(courseName, courseCode) {
            const context = {
                year: "Current Semester",
                dept: "Computer Science",
                course: courseName,
                code: courseCode
            };
            sessionStorage.setItem("courseContext", JSON.stringify(context));
            window.location.href = "/dashboard";
        }
    </script>
</body>
</html>
